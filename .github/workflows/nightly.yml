name: Nightly scrape and deploy

on:
  schedule:
    # 02:00 UTC daily (~03:00-04:00 Norway). GitHub cron is UTC.
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      days_ahead:
        description: "How many days ahead to scrape"
        required: false
        default: "150"

permissions:
  contents: write   # commit updated DB + index.html
  pages: write      # deploy to Pages
  id-token: write
  issues: write     # open an alert issue if the scrape returns no data

# Share the deploy lock with deploy.yml so the two never publish at once.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  nightly:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Playwright + Chromium
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@latest
          npx playwright install --with-deps chromium

      - name: Scrape source (bestille.no)
        id: scrape
        env:
          DAYS_AHEAD: ${{ github.event.inputs.days_ahead || '150' }}
        run: node scrape_playwright.js

      - name: Update DB and regenerate index.html
        run: python3 nightly.py

      - name: Commit changes (if any)
        run: |
          git config user.name "stampakalender-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stampakalender.db index.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Nightly update $(date -u +'%Y-%m-%d %H:%M UTC')"
            # Remote may have advanced since checkout (manual push or another run).
            # Rebase onto latest main and push, retrying on the race.
            pushed=false
            for i in 1 2 3; do
              git rebase --abort 2>/dev/null || true
              if git pull --rebase --autostash origin main && git push; then
                pushed=true; echo "Pushed on attempt $i"; break
              fi
              echo "Push attempt $i failed; retrying in 5s..."; sleep 5
            done
            if [ "$pushed" != true ]; then
              echo "ERROR: could not push after 3 attempts"; exit 1
            fi
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Stage static site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp CNAME _site/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # If the scrape step failed (0 bookings / source changed), open or update
      # a GitHub issue so the breakage is noticed. Runs only for scrape failures,
      # not push/deploy hiccups. The DB/site are untouched on this path.
      - name: Alert if scrape returned no data
        if: failure() && steps.scrape.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create nightly-failure --color B60205 \
            --description "Nightly scrape failure" 2>/dev/null || true
          TITLE="Nightly scrape found no bookings ($(date -u +%Y-%m-%d))"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY=$(printf '%s\n' \
            "The nightly Stampakalender scrape failed — usually this means **0 bookings** were returned for a source, which points to a change in the bestille.no page structure." \
            "" \
            "The run aborted before \`nightly.py\`, so the database and live site were **not** modified." \
            "" \
            "Failed run: $RUN_URL")
          existing=$(gh issue list --label nightly-failure --state open \
            --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$BODY"
          else
            gh issue create --title "$TITLE" --label nightly-failure --body "$BODY"
          fi
