<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stampakalender</title>
<style>
:root{ color-scheme: light; }
*{box-sizing:border-box;}
body{margin:0;background:#f4f6f9;color:#1c2430;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.45;}
.wrap{max-width:1180px;margin:0 auto;padding:20px 20px 60px;}
h1{font-size:22px;margin:0 0 2px;font-weight:700;}
.sub{color:#5b6675;font-size:13px;margin:0 0 14px;}
.note{background:#fff7e6;border:1px solid #f2d9a0;color:#7a5a12;border-radius:8px;padding:9px 12px;font-size:12.5px;margin-bottom:16px;}
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:12px;}
.seg{display:inline-flex;background:#e7ecf2;border-radius:9px;padding:3px;gap:2px;}
.seg button{border:0;background:transparent;padding:6px 13px;border-radius:7px;cursor:pointer;font-size:13px;color:#3a4658;font-weight:600;}
.seg button.on{background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.12);color:#12213a;}
.fbtn{border:1px solid #cdd6e0;background:#fff;border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;color:#33455f;font-weight:600;}
.fsum{font-size:12.5px;color:#5b6675;}
.combo{position:relative;}
.combo>input{min-width:210px;padding-right:28px;}
.combo-clear{position:absolute;right:6px;top:50%;transform:translateY(-50%);border:0;background:transparent;cursor:pointer;font-size:16px;line-height:1;color:#8592a3;padding:2px 4px;}
.combo-clear:hover{color:#33455f;}
.combo-clear[hidden]{display:none;}
.combo-list{position:absolute;top:calc(100% + 4px);left:0;z-index:30;background:#fff;border:1px solid #cdd6e0;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,.14);max-height:300px;overflow:auto;min-width:300px;padding:4px;}
.combo-list[hidden]{display:none;}
.combo-list .ci{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:12.5px;color:#3a4658;}
.combo-list .ci:hover{background:#eef3fb;}
.combo-list .ci.all{font-weight:600;color:#12213a;}
.combo-list .sw{width:12px;height:12px;border-radius:3px;flex:none;}
.combo-list .none{padding:8px;color:#8592a3;font-size:12px;}
select,input[type=search],input[type=date]{padding:7px 10px;border:1px solid #cdd6e0;border-radius:8px;background:#fff;font-size:13px;color:#1c2430;}
.fpanel{display:grid;grid-template-columns:1fr 1fr;gap:16px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px;margin-bottom:14px;}
.fpanel[hidden]{display:none;}
@media(max-width:640px){.fpanel{grid-template-columns:1fr;}}
.fcol .fhead{font-size:13px;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid #eef2f6;}
.fcol label{display:flex;align-items:center;gap:6px;cursor:pointer;}
.fitems{display:flex;flex-direction:column;gap:3px;max-height:240px;overflow:auto;}
.fitems label{font-size:12.5px;color:#3a4658;padding:1px 0;}
.factions{grid-column:1/-1;display:flex;gap:8px;border-top:1px solid #eef2f6;padding-top:10px;}
.factions button{border:1px solid #cdd6e0;background:#fff;border-radius:7px;padding:5px 12px;font-size:12.5px;cursor:pointer;color:#33455f;}
input[type=checkbox]{accent-color:#2f6fd0;}
.navbar{display:flex;align-items:center;gap:12px;margin:6px 0 12px;flex-wrap:wrap;}
.navbar button.nav{width:34px;height:34px;border:1px solid #cdd6e0;background:#fff;border-radius:8px;cursor:pointer;font-size:16px;color:#33455f;}
.navbar button.nav:disabled{opacity:.35;cursor:default;}
.navbar .idag{border:1px solid #cdd6e0;background:#fff;border-radius:8px;cursor:pointer;height:34px;padding:0 12px;font-size:13px;color:#33455f;}
.navbar .mlabel{font-size:17px;font-weight:700;text-align:center;text-transform:capitalize;}
.navbar #mlabel{min-width:190px;}
.layout{display:grid;grid-template-columns:1fr 340px;gap:18px;}
@media(max-width:900px){.layout{grid-template-columns:1fr;}}
.cal{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:12px;}
.dow{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px;}
.dow div{text-align:center;font-size:11px;font-weight:700;color:#8592a3;text-transform:uppercase;letter-spacing:.04em;}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cell{min-height:78px;border:1px solid #eef2f6;border-radius:9px;padding:5px 6px;background:#fbfcfe;cursor:default;position:relative;overflow:hidden;}
.cell.other{background:#f6f8fa;opacity:.5;}
.cell.has{cursor:pointer;}
.cell.has:hover{border-color:#9db6d6;}
.cell.sel{border-color:#2f6fd0;box-shadow:0 0 0 2px rgba(47,111,208,.25);}
.cell.closed{background:repeating-linear-gradient(45deg,#f0f2f5,#f0f2f5 6px,#e8ebef 6px,#e8ebef 12px);}
.dnum{font-size:12px;font-weight:700;color:#42506a;}
.cell.today .dnum{background:#2f6fd0;color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;}
.chips{margin-top:3px;display:flex;flex-direction:column;gap:2px;}
.chip{font-size:10.5px;line-height:1.25;padding:1px 5px;border-radius:4px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.more{font-size:10px;color:#7a8698;font-weight:600;padding-left:2px;}
.closedbadge{font-size:10px;color:#8a94a3;font-weight:600;}
.side{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px;align-self:start;position:sticky;top:12px;}
.side h2{font-size:15px;margin:0 0 2px;}
.side .d{color:#5b6675;font-size:12.5px;margin-bottom:10px;text-transform:capitalize;}
.side .tllink{margin-bottom:12px;}
.bk{border-left:4px solid #ccc;padding:7px 9px;border-radius:6px;background:#f7f9fc;margin-bottom:7px;}
.bk .t{font-weight:700;font-size:13px;}
.bk .r{font-size:12px;color:#42506a;}
.bk .n{font-size:12px;color:#5b6675;}
.empty{color:#8592a3;font-size:13px;padding:14px 0;text-align:center;}
.venuetag{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;margin-bottom:4px;}
.vt-eid{background:#e6f0ff;color:#1e4fa3;}
.vt-stamp{background:#e5f6ec;color:#1f7a45;}
.stats{display:flex;gap:14px;flex-wrap:wrap;margin:2px 0 14px;}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:8px 14px;}
.stat b{font-size:19px;display:block;}
.stat span{font-size:11.5px;color:#6b7686;}
.legend{margin-top:16px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:12px 14px;}
.legend h3{margin:0 0 8px;font-size:13px;}
.legend .items{display:flex;flex-wrap:wrap;gap:6px 14px;}
.legend .li{display:flex;align-items:center;gap:6px;font-size:12px;color:#3a4658;}
.legend .sw{width:12px;height:12px;border-radius:3px;}
.footer{margin-top:22px;font-size:11.5px;color:#8592a3;}
/* tidslinje / dagsvisning */
.tl{overflow-x:auto;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:10px 12px;}
.tlinner{min-width:760px;}
.tlaxis{position:relative;height:16px;margin-left:170px;border-bottom:1px solid #e6eaef;}
.tltick{position:absolute;top:0;font-size:10px;color:#8592a3;transform:translateX(-50%);}
.tlrow{display:flex;align-items:stretch;border-bottom:1px solid #f4f6f9;min-height:30px;}
.tlrow.arena{background:#f7f9fc;}
.tlrow.arena .tlname{font-weight:700;font-size:10.5px;color:#5b6675;text-transform:uppercase;letter-spacing:.03em;}
.tlname{width:170px;flex:none;font-size:12px;color:#33455f;display:flex;align-items:center;padding:3px 8px 3px 2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tltrack{position:relative;flex:1;background-image:repeating-linear-gradient(to right,transparent,transparent calc(6.0606% - 1px),#eef2f6 calc(6.0606% - 1px),#eef2f6 6.0606%);}
.tlbar{position:absolute;top:3px;bottom:3px;border-radius:3px;color:#fff;font-size:10px;padding:0 4px;overflow:hidden;white-space:nowrap;display:flex;align-items:center;box-shadow:0 1px 1px rgba(0,0,0,.12);}
.tlfree{position:absolute;left:6px;top:0;bottom:0;display:flex;align-items:center;font-size:10px;color:#c6cdd6;}
.tlhint{font-size:11.5px;color:#8592a3;margin:2px 0 10px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Stampakalender</h1>
  <p class="sub">Haller, baner og garderober på Stampesletta, Lillehammer · Eidsiva Arena / Ungdomshallen og uteanleggene</p>
  <div class="note" id="note"></div>

  <div class="stats" id="stats"></div>

  <div class="toolbar">
    <div class="seg" id="viewSeg">
      <button data-view="month">Måned</button>
      <button data-view="day" class="on">Dag</button>
    </div>
    <button id="filterToggle" class="fbtn">Filtrer ressurser ▾</button>
    <span class="fsum" id="filterSummary"></span>
    <div class="combo">
      <input type="text" id="search" placeholder="Søk/velg leietaker…" autocomplete="off">
      <button class="combo-clear" id="comboClear" type="button" hidden aria-label="Nullstill">×</button>
      <div class="combo-list" id="comboList" hidden></div>
    </div>
  </div>
  <div class="fpanel" id="filterPanel" hidden>
    <div class="fcol">
      <div class="fhead"><label><input type="checkbox" class="arenaAll" data-venue="eid"> <b>Eidsiva Arena / Ungdomshallen</b></label></div>
      <div class="fitems" id="fitems-eid"></div>
    </div>
    <div class="fcol">
      <div class="fhead"><label><input type="checkbox" class="arenaAll" data-venue="stamp"> <b>Stampesletta</b></label></div>
      <div class="fitems" id="fitems-stamp"></div>
    </div>
    <div class="factions"><button id="selAll">Velg alle</button><button id="selNone">Nullstill</button></div>
  </div>

  <div class="navbar" id="monthNav" hidden>
    <button class="nav" id="prev">‹</button>
    <div class="mlabel" id="mlabel"></div>
    <button class="nav" id="next">›</button>
    <button class="idag" id="todayBtn">I dag</button>
  </div>
  <div class="navbar" id="dayNav">
    <button class="nav" id="dayPrev">‹</button>
    <input type="date" id="dayInput">
    <button class="nav" id="dayNext">›</button>
    <button class="idag" id="dayToday">I dag</button>
    <div class="mlabel" id="dayLabel"></div>
  </div>

  <div id="monthView" hidden>
    <div class="layout">
      <div class="cal">
        <div class="dow"><div>Man</div><div>Tir</div><div>Ons</div><div>Tor</div><div>Fre</div><div>Lør</div><div>Søn</div></div>
        <div class="grid" id="grid"></div>
      </div>
      <div class="side" id="side">
        <div class="empty">Velg en dag i kalenderen for å se detaljer.</div>
      </div>
    </div>
  </div>
  <div id="dayView"></div>

  <div class="footer" id="footer"></div>
</div>

<script>
const DATA = __DATA__;
const TODAY = "__TODAY__";
const MONTHS = ["Januar","Februar","Mars","April","Mai","Juni","Juli","August","September","Oktober","November","Desember"];
const WD = ["Søndag","Mandag","Tirsdag","Onsdag","Torsdag","Fredag","Lørdag"];
const PALETTE = ["#2f6fd0","#e0559a","#e0793a","#3aa675","#8a5cd1","#c0392b","#0f9aa8","#b5892a","#5b6ee0","#d1418f","#487a2a","#a0522d","#6a4bbd","#c72c6a","#2f8f9d","#946b00","#7a4fd0","#d05b2f","#3a7a5b"];
const colorFor = {};
DATA.navn.forEach((n,i)=>colorFor[n]=PALETTE[i%PALETTE.length]);

const eidDays={}, stampDays={};
for(const d in DATA.eid){ eidDays[d]=DATA.eid[d].map(e=>({venue:'eid',res:DATA.resEid[e[0]],name:DATA.navn[e[1]],from:e[2],to:e[3]})); }
for(const d in DATA.stamp){ stampDays[d]=DATA.stamp[d].map(e=>({venue:'stamp',res:DATA.resStamp[e[0]],name:DATA.navn[e[1]],from:e[2],to:e[3]})); }

const closure = DATA.stengt.eidsiva;
function isEidClosed(day){ return day>=closure.fra && day<=closure.til; }

const _T=TODAY.split('-');
function defaultPicked(venue,r){
  if(venue==='eid') return /^Uhall - garderobe/i.test(r);
  const rl=r.toLowerCase();
  return rl.indexOf('garderobe')===0 || rl.indexOf('søndre bane')===0 || rl.indexOf('øvre bane')===0;
}
const picked = new Set();
DATA.resEid.forEach(r=>{ if(defaultPicked('eid',r)) picked.add('eid|'+r); });
DATA.resStamp.forEach(r=>{ if(defaultPicked('stamp',r)) picked.add('stamp|'+r); });
let state={ view:'month', q:'', y:+_T[0], m:+_T[1]-1, sel:null, day:TODAY };

function pad(n){return String(n).padStart(2,'0');}
function iso(y,m,d){return y+"-"+pad(m+1)+"-"+pad(d);}
function fmtLocal(dt){return dt.getFullYear()+"-"+pad(dt.getMonth()+1)+"-"+pad(dt.getDate());}
function eidVisible(){ return DATA.resEid.some(r=>picked.has('eid|'+r)); }
function fromMin(hhmm){const p=hhmm.split(':');return (+p[0])*60+(+p[1]);}
const DSTART=420, DEND=1410, DSPAN=DEND-DSTART;
function xpct(min){return (Math.max(DSTART,Math.min(DEND,min))-DSTART)/DSPAN*100;}

function bookingsFor(day){
  let list=[].concat(eidDays[day]||[], stampDays[day]||[]);
  list=list.filter(b=>picked.has(b.venue+'|'+b.res));
  if(state.q){const q=state.q.toLowerCase(); list=list.filter(b=>b.name.toLowerCase().includes(q));}
  list.sort((a,b)=> a.from.localeCompare(b.from) || a.res.localeCompare(b.res));
  return list;
}

function groupBookings(list){
  const map=new Map(); const order=[];
  list.forEach(b=>{
    const k=b.venue+'|'+b.name+'|'+b.from+'|'+b.to;
    if(!map.has(k)){ map.set(k,{venue:b.venue,name:b.name,from:b.from,to:b.to,res:[b.res]}); order.push(k); }
    else map.get(k).res.push(b.res);
  });
  return order.map(k=>map.get(k)).sort((a,b)=> a.from.localeCompare(b.from) || a.name.localeCompare(b.name));
}

function buildFilter(){
  const mk=(venue,arr)=>arr.map(r=>'<label><input type="checkbox" class="resChk" data-key="'+venue+'|'+r+'"'+(picked.has(venue+'|'+r)?' checked':'')+'> '+r+'</label>').join('');
  document.getElementById('fitems-eid').innerHTML=mk('eid',DATA.resEid);
  document.getElementById('fitems-stamp').innerHTML=mk('stamp',DATA.resStamp);
  document.querySelectorAll('.resChk').forEach(c=>c.onchange=onResChange);
  document.querySelectorAll('.arenaAll').forEach(c=>c.onchange=onArenaToggle);
  document.getElementById('selAll').onclick=()=>setAll(true);
  document.getElementById('selNone').onclick=()=>setAll(false);
  document.getElementById('filterToggle').onclick=()=>{const p=document.getElementById('filterPanel'); p.hidden=!p.hidden; document.getElementById('filterToggle').textContent='Filtrer ressurser '+(p.hidden?'▾':'▴');};
  syncArenaChecks(); updateSummary();
}
function onResChange(e){ const k=e.target.dataset.key; if(e.target.checked)picked.add(k); else picked.delete(k); syncArenaChecks(); updateSummary(); refresh(); }
function onArenaToggle(e){ const v=e.target.dataset.venue, on=e.target.checked; const arr=v==='eid'?DATA.resEid:DATA.resStamp; arr.forEach(r=>{const k=v+'|'+r; if(on)picked.add(k); else picked.delete(k);}); document.querySelectorAll('.resChk').forEach(c=>{if(c.dataset.key.indexOf(v+'|')===0)c.checked=on;}); syncArenaChecks(); updateSummary(); refresh(); }
function setAll(on){ document.querySelectorAll('.resChk').forEach(c=>{c.checked=on; const k=c.dataset.key; if(on)picked.add(k); else picked.delete(k);}); syncArenaChecks(); updateSummary(); refresh(); }
function syncArenaChecks(){ [['eid',DATA.resEid],['stamp',DATA.resStamp]].forEach(function(pair){ const v=pair[0], arr=pair[1]; const n=arr.filter(r=>picked.has(v+'|'+r)).length; const master=document.querySelector('.arenaAll[data-venue="'+v+'"]'); if(master){ master.checked=n===arr.length; master.indeterminate=n>0&&n<arr.length; } }); }
function updateSummary(){ const tot=DATA.resEid.length+DATA.resStamp.length, n=picked.size; document.getElementById('filterSummary').textContent = n===tot?('Alle ressurser ('+tot+')') : (n===0?'Ingen ressurser valgt':(n+' av '+tot+' ressurser valgt')); }

function renderStats(){
  const nb = Object.values(eidDays).reduce((a,x)=>a+x.length,0)+Object.values(stampDays).reduce((a,x)=>a+x.length,0);
  const nd = new Set(Object.keys(eidDays).concat(Object.keys(stampDays))).size;
  document.getElementById('stats').innerHTML =
    '<div class="stat"><b>'+nb+'</b><span>bookinger</span></div>'+
    '<div class="stat"><b>'+nd+'</b><span>dager med aktivitet</span></div>'+
    '<div class="stat"><b>'+(DATA.resEid.length+DATA.resStamp.length)+'</b><span>ressurser</span></div>'+
    '<div class="stat"><b>'+DATA.navn.length+'</b><span>leietakere</span></div>';
}

function render(){
  document.getElementById('mlabel').textContent = MONTHS[state.m]+" "+state.y;
  const first=new Date(state.y,state.m,1);
  let start=(first.getDay()+6)%7;
  const daysInMonth=new Date(state.y,state.m+1,0).getDate();
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  const totalCells=Math.ceil((start+daysInMonth)/7)*7;
  for(let i=0;i<totalCells;i++){
    const dnum=i-start+1;
    const cell=document.createElement('div');
    cell.className='cell';
    if(dnum<1||dnum>daysInMonth){cell.className+=' other';grid.appendChild(cell);continue;}
    const day=iso(state.y,state.m,dnum);
    const list=bookingsFor(day);
    const eidClosed=eidVisible() && isEidClosed(day);
    let html='<span class="dnum">'+dnum+'</span>';
    if(day===TODAY) cell.classList.add('today');
    if(list.length){
      cell.classList.add('has');
      const groups=groupBookings(list);
      const shown=groups.slice(0,3);
      html+='<div class="chips">'+shown.map(g=>'<span class="chip" style="background:'+colorFor[g.name]+'" title="'+g.from+'-'+g.to+' · '+g.name+' · '+g.res.join(', ')+'">'+g.from+' '+g.name.split(' - ')[0]+(g.res.length>1?' ('+g.res.length+')':'')+'</span>').join('')+'</div>';
      if(groups.length>3) html+='<div class="more">+'+(groups.length-3)+' til</div>';
    } else if(eidClosed){
      cell.classList.add('closed');
      html+='<div class="closedbadge">Stengt (sommer)</div>';
    }
    cell.innerHTML=html;
    if(list.length){ cell.onclick=()=>{state.sel=day;render();renderSide();}; }
    if(day===state.sel) cell.classList.add('sel');
    grid.appendChild(cell);
  }
}

function renderSide(){
  const side=document.getElementById('side');
  if(!state.sel){side.innerHTML='<div class="empty">Velg en dag i kalenderen for å se detaljer.</div>';return;}
  const d=new Date(state.sel+"T00:00:00");
  const list=bookingsFor(state.sel);
  const groups=groupBookings(list);
  let h='<h2>'+WD[d.getDay()]+' '+d.getDate()+'. '+MONTHS[d.getMonth()].toLowerCase()+'</h2><div class="d">'+groups.length+' booking'+(groups.length===1?'':'er')+'</div>';
  h+='<div class="tllink"><button class="fbtn" id="tlBtn" data-day="'+state.sel+'">Vis tidslinje for dagen →</button></div>';
  if(!groups.length){ h+='<div class="empty">Ingen bookinger'+((eidVisible()&&isEidClosed(state.sel))?' — Eidsiva Arena sommerstengt.':'.')+'</div>'; }
  groups.forEach(g=>{
    const resHtml = g.res.length>1
      ? '<div class="r"><b>'+g.res.length+' ressurser:</b> '+g.res.join(', ')+'</div>'
      : '<div class="r">'+g.res[0]+'</div>';
    h+='<div class="bk" style="border-color:'+colorFor[g.name]+'">'+
       '<span class="venuetag '+(g.venue==='eid'?'vt-eid':'vt-stamp')+'">'+(g.venue==='eid'?'Eidsiva':'Stampesletta')+'</span>'+
       '<div class="t">'+g.from+'–'+g.to+'</div>'+
       resHtml+
       '<div class="n">'+g.name+'</div></div>';
  });
  side.innerHTML=h;
  const _b=document.getElementById('tlBtn'); if(_b){ _b.onclick=function(){ goDay(_b.getAttribute('data-day')); }; }
}

function renderDay(){
  const day=state.day;
  const dd=new Date(day+"T00:00:00");
  document.getElementById('dayLabel').textContent = WD[dd.getDay()]+' '+dd.getDate()+'. '+MONTHS[dd.getMonth()].toLowerCase()+' '+dd.getFullYear();
  document.getElementById('dayInput').value = day;
  const list=bookingsFor(day);
  const byRes={};
  list.forEach(b=>{ const k=b.venue+'|'+b.res; (byRes[k]=byRes[k]||[]).push(b); });
  let ticks='';
  for(let hnum=7;hnum<=23;hnum++){ ticks+='<div class="tltick" style="left:'+xpct(hnum*60)+'%">'+hnum+'</div>'; }
  let rows='';
  [['eid','Eidsiva Arena / Ungdomshallen',DATA.resEid],['stamp','Stampesletta',DATA.resStamp]].forEach(function(grp){
    const v=grp[0], label=grp[1], arr=grp[2];
    const pr=arr.filter(r=>picked.has(v+'|'+r));
    if(!pr.length) return;
    rows+='<div class="tlrow arena"><div class="tlname">'+label+'</div><div class="tltrack"></div></div>';
    pr.forEach(function(r){
      const bs=byRes[v+'|'+r]||[];
      let bars='';
      bs.forEach(function(b){ const l=xpct(fromMin(b.from)), w=Math.max(0.6,xpct(fromMin(b.to))-l); bars+='<div class="tlbar" style="left:'+l+'%;width:'+w+'%;background:'+colorFor[b.name]+'" title="'+b.from+'–'+b.to+'  '+b.name+'">'+b.from+' '+b.name.split(' - ')[0]+'</div>'; });
      rows+='<div class="tlrow"><div class="tlname" title="'+r+'">'+r+'</div><div class="tltrack">'+bars+'</div></div>';
    });
  });
  let html='<div class="tlhint">Tidslinje 07:00–23:30. Fargede felt = opptatt (leietaker), tomme = ledig. Bruk ressursfilteret for å velge hvilke linjer som vises.</div>';
  if(!rows){ html+='<div class="empty">Ingen ressurser valgt. Åpne «Filtrer ressurser» og velg minst én.</div>'; }
  else { html+='<div class="tl"><div class="tlinner"><div class="tlaxis">'+ticks+'</div>'+rows+'</div></div>'; }
  document.getElementById('dayView').innerHTML=html;
}

function refresh(){ if(state.view==='day'){ renderDay(); } else { render(); renderSide(); } }

function switchView(v){
  state.view=v;
  document.querySelectorAll('#viewSeg button').forEach(b=>b.classList.toggle('on', b.dataset.view===v));
  document.getElementById('monthView').hidden = v!=='month';
  document.getElementById('dayView').hidden = v!=='day';
  document.getElementById('monthNav').hidden = v!=='month';
  document.getElementById('dayNav').hidden = v!=='day';
  refresh();
}
function goDay(dateStr){ state.day=dateStr; switchView('day'); }

const allDays=Object.keys(eidDays).concat(Object.keys(stampDays)).sort();
const minDay=allDays[0], maxDay=allDays[allDays.length-1];
function updateNav(){
  const cur=iso(state.y,state.m,1).slice(0,7);
  document.getElementById('prev').disabled = cur<=minDay.slice(0,7);
  document.getElementById('next').disabled = cur>=maxDay.slice(0,7);
}
function shiftDay(delta){ const d=new Date(state.day+"T00:00:00"); d.setDate(d.getDate()+delta); state.day=fmtLocal(d); renderDay(); }

document.getElementById('viewSeg').onclick=e=>{ if(e.target.tagName==='BUTTON') switchView(e.target.dataset.view); };
(function(){
  const searchEl=document.getElementById('search');
  const listEl=document.getElementById('comboList');
  const clearEl=document.getElementById('comboClear');
  function updateClear(){ clearEl.hidden = !searchEl.value; }
  function esc(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
  function renderCombo(){
    const q=(searchEl.value||'').toLowerCase();
    const matches=DATA.navn.filter(n=>n.toLowerCase().includes(q));
    let h='<div class="ci all" data-val="">Alle leietakere</div>';
    if(!matches.length) h+='<div class="none">Ingen treff</div>';
    else h+=matches.map(n=>'<div class="ci" data-val="'+esc(n)+'"><span class="sw" style="background:'+colorFor[n]+'"></span>'+n+'</div>').join('');
    listEl.innerHTML=h;
  }
  searchEl.addEventListener('focus',function(){ renderCombo(); listEl.hidden=false; });
  searchEl.addEventListener('input',function(){ state.q=searchEl.value; renderCombo(); listEl.hidden=false; updateClear(); refresh(); });
  listEl.addEventListener('mousedown',function(e){ const ci=e.target.closest('.ci'); if(!ci)return; e.preventDefault(); const val=ci.getAttribute('data-val'); searchEl.value=val; state.q=val; listEl.hidden=true; updateClear(); refresh(); });
  clearEl.addEventListener('click',function(){ searchEl.value=''; state.q=''; clearEl.hidden=true; listEl.hidden=true; refresh(); searchEl.focus(); renderCombo(); });
  document.addEventListener('click',function(e){ if(!e.target.closest('.combo')) listEl.hidden=true; });
  updateClear();
})();
document.getElementById('prev').onclick=()=>{state.m--;if(state.m<0){state.m=11;state.y--;}render();updateNav();};
document.getElementById('next').onclick=()=>{state.m++;if(state.m>11){state.m=0;state.y++;}render();updateNav();};
document.getElementById('todayBtn').onclick=()=>{state.y=+_T[0];state.m=+_T[1]-1;render();updateNav();};
document.getElementById('dayPrev').onclick=()=>shiftDay(-1);
document.getElementById('dayNext').onclick=()=>shiftDay(1);
document.getElementById('dayToday').onclick=()=>{state.day=TODAY;renderDay();};
document.getElementById('dayInput').onchange=e=>{ if(e.target.value){ state.day=e.target.value; renderDay(); } };

const _hd=TODAY.split('-');const _MND=['januar','februar','mars','april','mai','juni','juli','august','september','oktober','november','desember'];const _HENTET=(+_hd[2])+'. '+_MND[+_hd[1]-1]+' '+_hd[0];
document.getElementById('note').innerHTML='Data hentet fra bestille.no <b>'+_HENTET+'</b>. Bookinger for høsten/vinteren er få fordi de i stor grad ikke var lagt inn ennå på uttrekkstidspunktet. Eidsiva Arena er sommerstengt 30.06–02.08.';
document.getElementById('footer').innerHTML='Kilde: statisk.bestille.no (Lillehammer kommune / Aktiv Kommune). «Stengt LK»-rader er utelatt fra bookinglisten og vist som sommerstengt.';

buildFilter(); renderStats(); render(); updateNav(); renderSide(); switchView('day');
</script>
